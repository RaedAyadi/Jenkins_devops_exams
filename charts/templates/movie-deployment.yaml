apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-service
spec:
  replicas: {{ .Values.movieService.replicas }}
  selector:
    matchLabels:
      app: movie-service
  template:
    metadata:
      labels:
        app: movie-service
    spec:
      containers:
        - name: movie-service
          image: "{{ .Values.movieService.image.repository }}:{{ .Values.global.tag }}"
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URI
              value: {{ .Values.movieService.env.DATABASE_URI }}
            - name: CAST_SERVICE_HOST_URL
              value: {{ .Values.movieService.env.CAST_SERVICE_HOST_URL }}